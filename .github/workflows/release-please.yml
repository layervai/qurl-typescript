name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref_name:
        description: "Full 40-character commit SHA to publish to npm"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  # Trusted publishing requires npm >= 11.5.1; pin a known-good CLI past the
  # repo's dependency-age fence and use it consistently before publish. Future
  # bumps must also be old enough for .npmrc's min-release-age gate, including
  # if the runner's bundled npm starts honoring that gate during bootstrap.
  NPM_VERSION: "11.10.0"

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  test:
    needs: release-please
    if: ${{ !cancelled() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Load-bearing guard: keep this validation inline in the trusted workflow,
      # not in code loaded from the operator-selected ref.
      - name: Validate manual publish ref
        if: github.event_name == 'workflow_dispatch'
        env:
          REF_NAME: ${{ github.event.inputs.ref_name }}
        run: |
          if [[ ! "$REF_NAME" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "ref_name must be a full 40-character commit SHA"
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.ref_name || needs.release-please.outputs.tag_name }}
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
      - name: Validate manual publish ancestry
        if: github.event_name == 'workflow_dispatch'
        env:
          REF_NAME: ${{ github.event.inputs.ref_name }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$REF_NAME" origin/main; then
            echo "ref_name must be an ancestor of main"
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install -g npm@${{ env.NPM_VERSION }}
      - run: npm ci
      - run: npm run build
      - run: npm run smoke:dist
      - run: npm test

  publish:
    needs: [release-please, test]
    if: ${{ !cancelled() && needs.test.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest
    # Serialize only the npm publish boundary; release-please maintenance and
    # validation jobs can still run while a manual publish waits for approval.
    concurrency:
      group: npm-publish
      cancel-in-progress: false
    # Manual dispatch can publish any approved ref; keep this environment's
    # required-reviewer, no-self-review, and no-admin-bypass rules intact.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      # Load-bearing guard: keep this validation inline in the trusted workflow,
      # not in code loaded from the operator-selected ref.
      - name: Validate manual publish ref
        if: github.event_name == 'workflow_dispatch'
        env:
          REF_NAME: ${{ github.event.inputs.ref_name }}
        run: |
          if [[ ! "$REF_NAME" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "ref_name must be a full 40-character commit SHA"
            exit 1
          fi
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.ref_name || needs.release-please.outputs.tag_name }}
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
      - name: Validate manual publish ancestry
        if: github.event_name == 'workflow_dispatch'
        env:
          REF_NAME: ${{ github.event.inputs.ref_name }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$REF_NAME" origin/main; then
            echo "ref_name must be an ancestor of main"
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          # setup-node v6 auto-caches package managers by default; keep the
          # privileged publish job independent of restored dependency caches.
          package-manager-cache: false
          # `registry-url` is REQUIRED for OIDC trusted publishing — it's in
          # npm's canonical example, and without it `npm publish` never
          # attempts the OIDC exchange (fails ENEEDAUTH). setup-node also
          # injects a placeholder NODE_AUTH_TOKEN here; npm prefers ANY
          # configured token over OIDC, so the "Strip placeholder npm auth"
          # step below removes that auth line before publish — otherwise the
          # placeholder shadows trusted publishing. The npm-side trusted
          # publisher must match repo `layervai/qurl-typescript`, workflow file
          # `release-please.yml`, AND the `npm-publish` environment used below
          # (an env-scoped job changes the OIDC `sub` claim).
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@${{ env.NPM_VERSION }}
      - run: npm ci
      # .npmrc disables lifecycle scripts, so build and smoke explicitly here.
      - run: npm run build
      - run: npm run smoke:dist
      # setup-node's `registry-url` injects a placeholder auth token
      # (`//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}` with
      # NODE_AUTH_TOKEN=XXXXX-XXXXX-XXXXX-XXXXX). npm prefers ANY configured
      # token over OIDC, so the placeholder shadows trusted publishing —
      # observed as E404 on run 27317922844 despite a correct trusted-publisher
      # config, and ENEEDAUTH once registry-url (and the registry) was removed.
      # Strip only the auth line, leaving the registry configured but
      # tokenless, so `npm publish` performs the OIDC exchange against the
      # trusted publisher via the job's id-token: write.
      - name: Strip placeholder npm auth so OIDC trusted publishing engages
        env:
          USERCONFIG: ${{ env.NPM_CONFIG_USERCONFIG }}
        run: |
          if [ -n "${USERCONFIG:-}" ] && [ -f "${USERCONFIG}" ]; then
            sed -i '/_authToken/d' "${USERCONFIG}"
            echo "Stripped _authToken from ${USERCONFIG}"
          else
            # Fail fast: with registry-url set above, setup-node always exports
            # NPM_CONFIG_USERCONFIG. If it's missing, setup-node's mechanism
            # changed and the placeholder token is NOT stripped — publish would
            # then silently fall back to it and fail with a confusing E404.
            # Surface the real cause here instead.
            echo "::error::NPM_CONFIG_USERCONFIG is unset or missing; cannot strip the placeholder npm token. setup-node's auth mechanism likely changed — OIDC trusted publishing would be shadowed. Failing fast." >&2
            exit 1
          fi
      - run: npm publish --provenance
