name: Dependency Age Check
#
# 7-day quarantine on newly published npm packages — a supply-chain defense
# against typosquatting / dependency-confusion attacks where an attacker
# publishes a malicious version and hopes someone pulls it in before the
# community notices. Waiting 7 days gives npm and security researchers a
# window to flag or pull bad packages.
#
# Complementary to GitHub's Dependabot / CodeQL / dependency-review which
# gate on *known* vulnerabilities (CVE/GHSA). This check gates on *age*,
# catching malicious packages before any CVE has been filed.

on:
  pull_request:
    branches: [main]
    paths:
      - "package-lock.json"
  # Manual dispatch is intended for re-running the check on a feature
  # branch with lockfile changes — triggering on `main` itself produces
  # an empty diff against origin/main and the job exits early (harmless).
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref to diff against (branch or full ref) when running manually from a feature branch"
        required: false
        default: "main"
      min_age_days:
        description: "Minimum publish age in days (default 7)"
        required: false
        default: "7"

# Cancel superseded runs on the same PR branch — each run makes sequential
# external calls with sleep gates, so there's no reason to let two race for
# an outdated diff.
concurrency:
  group: dep-age-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-dependency-age:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # On `workflow_dispatch`, `github.event.pull_request` is null — the
    # labels array evaluates empty and `contains(...)` is false, so the
    # job always runs. That's the desired behavior: manual runs shouldn't
    # be bypassable via PR labels.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'age-check-bypass') }}
    steps:
      # fetch-depth: 0 is intentional — the three-dot diff
      # `${base_ref}...HEAD` needs the merge base, which can be arbitrarily
      # deep if branches have diverged. For this repo the full clone cost
      # is negligible; the correctness is worth it.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check npm dependency ages (7-day quarantine)
        # Implementation lives in `.github/scripts/check-dependency-age.sh`
        # so it can be linted with ShellCheck and tested in isolation rather
        # than only via end-to-end CI. Keep the env: block here (not in the
        # script) so the GitHub expressions for MIN_AGE_DAYS and BASE_REF
        # stay visible alongside the workflow_dispatch inputs.
        shell: bash
        env:
          MIN_AGE_DAYS: ${{ inputs.min_age_days || '7' }}
          BASE_REF: ${{ github.event.pull_request.base.ref || inputs.base_ref || 'main' }}
        run: bash .github/scripts/check-dependency-age.sh
