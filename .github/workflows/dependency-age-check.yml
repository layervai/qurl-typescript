name: Dependency Age Check

on:
  pull_request:
    paths:
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-dependency-age:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'age-check-bypass') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check npm dependency ages (7-day quarantine)
        env:
          MIN_AGE_DAYS: "7"
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          set -euo pipefail

          failed=false
          now_epoch=$(date +%s)
          base_ref="origin/${BASE_REF}"

          if ! git diff --name-only "${base_ref}...HEAD" -- package-lock.json | grep -q .; then
            echo "No package-lock.json changes detected"
            exit 0
          fi

          # Extract newly added package name+version pairs from resolved URLs.
          # Handles both scoped (@scope/name) and unscoped packages.
          # Format: "package@version" per line.
          new_deps=$(git diff "${base_ref}...HEAD" -- package-lock.json \
            | grep '^+' | grep '"resolved"' \
            | sed -n \
              -e 's|.*https://registry.npmjs.org/\(@[^/]*/[^/]*\)/-/.*-\([0-9][0-9.]*\)\.tgz.*|\1@\2|p' \
              -e 's|.*https://registry.npmjs.org/\([^@][^/]*\)/-/.*-\([0-9][0-9.]*\)\.tgz.*|\1@\2|p' \
            | sort -u)

          if [ -z "$new_deps" ]; then
            echo "No new npm packages detected"
            exit 0
          fi

          for dep in $new_deps; do
            # dep is "name@version" or "@scope/name@version"
            # Extract version: everything after the last @
            version="${dep##*@}"
            # Extract package name: everything before the last @
            pkg="${dep%@*}"

            # Rate-limit registry requests to avoid 429s on large dependency updates.
            sleep 0.2

            response=$(curl -sf -m 10 "https://registry.npmjs.org/${pkg}" 2>/dev/null || echo "")
            if [ -z "$response" ]; then
              echo "::error::Could not verify age for ${pkg}@${version} (registry unreachable)"
              failed=true
              continue
            fi

            # Check the specific installed version's publish time, not dist-tags.latest.
            publish_time=$(echo "$response" | jq -r --arg v "$version" '.time[$v] // empty')
            if [ -z "$publish_time" ]; then
              echo "  SKIP: ${pkg}@${version} (version not found in registry timestamps)"
              continue
            fi

            publish_epoch=$(date -d "$publish_time" +%s 2>/dev/null || echo "0")
            if [ "$publish_epoch" -eq 0 ]; then
              echo "::error::Could not parse publish timestamp for ${pkg}@${version}"
              failed=true
              continue
            fi

            age_days=$(( (now_epoch - publish_epoch) / 86400 ))

            if [ "$age_days" -lt "$MIN_AGE_DAYS" ]; then
              echo "::error::${pkg}@${version} published ${age_days} day(s) ago (minimum: ${MIN_AGE_DAYS})"
              failed=true
            else
              echo "  OK: ${pkg}@${version} (${age_days} days old)"
            fi
          done

          if [ "$failed" = true ]; then
            echo ""
            echo "::error::One or more npm dependencies failed the age check."
            echo "To bypass for emergency updates, add the 'age-check-bypass' label to this PR."
            exit 1
          fi

          echo "All npm dependencies are at least ${MIN_AGE_DAYS} days old"
