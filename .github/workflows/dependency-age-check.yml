name: Dependency Age Check

on:
  pull_request:
    paths:
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-dependency-age:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'age-check-bypass') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check npm dependency ages (7-day quarantine)
        env:
          MIN_AGE_DAYS: "7"
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          set -euo pipefail

          failed=false
          now_epoch=$(date +%s)
          base_ref="origin/${BASE_REF}"

          if ! git diff --name-only "${base_ref}...HEAD" -- package-lock.json | grep -q .; then
            echo "No package-lock.json changes detected"
            exit 0
          fi

          # Extract newly added packages from the lockfile diff
          new_packages=$(git diff "${base_ref}...HEAD" -- package-lock.json \
            | grep '^+' | grep '"resolved"' \
            | sed -n 's|.*https://registry.npmjs.org/\([^/]*\)/-/.*|\1|p' \
            | sort -u)

          if [ -z "$new_packages" ]; then
            echo "No new npm packages detected"
            exit 0
          fi

          for pkg in $new_packages; do
            # Decode scoped packages: %2f -> /
            decoded_pkg=$(echo "$pkg" | sed 's/%2f/\//g')

            response=$(curl -sf -m 10 "https://registry.npmjs.org/${decoded_pkg}" 2>/dev/null || echo "")
            if [ -z "$response" ]; then
              echo "::error::Could not verify age for ${decoded_pkg} (registry unreachable)"
              failed=true
              continue
            fi

            # Get the latest version's publish time
            publish_time=$(echo "$response" | jq -r '.time[."dist-tags".latest] // empty')
            if [ -z "$publish_time" ]; then
              echo "  SKIP: ${decoded_pkg} (could not determine publish time)"
              continue
            fi

            publish_epoch=$(date -d "$publish_time" +%s 2>/dev/null || echo "0")
            if [ "$publish_epoch" -eq 0 ]; then
              echo "::error::Could not parse publish timestamp for ${decoded_pkg}"
              failed=true
              continue
            fi

            age_days=$(( (now_epoch - publish_epoch) / 86400 ))

            if [ "$age_days" -lt "$MIN_AGE_DAYS" ]; then
              echo "::error::${decoded_pkg} latest version published ${age_days} day(s) ago (minimum: ${MIN_AGE_DAYS})"
              failed=true
            else
              echo "  OK: ${decoded_pkg} (${age_days} days old)"
            fi
          done

          if [ "$failed" = true ]; then
            echo ""
            echo "::error::One or more npm dependencies failed the age check."
            echo "To bypass for emergency updates, add the 'age-check-bypass' label to this PR."
            exit 1
          fi

          echo "All npm dependencies are at least ${MIN_AGE_DAYS} days old"
