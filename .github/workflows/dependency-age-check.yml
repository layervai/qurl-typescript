name: Dependency Age Check

on:
  pull_request:
    paths:
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-dependency-age:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'age-check-bypass') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check npm dependency ages (7-day quarantine)
        env:
          MIN_AGE_DAYS: "7"
          BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
        run: |
          set -euo pipefail

          failed=false
          now_epoch=$(date +%s)
          base_ref="origin/${BASE_REF}"

          if ! git diff --name-only "${base_ref}...HEAD" -- package-lock.json | grep -q .; then
            echo "No package-lock.json changes detected"
            exit 0
          fi

          # Extract newly added package names from resolved URLs in the diff.
          # Handles both scoped (@scope/name) and unscoped packages.
          # Version is read from the lockfile JSON — not parsed from the URL,
          # which avoids greedy-regex issues with prerelease segments.
          new_packages=$(git diff "${base_ref}...HEAD" -- package-lock.json \
            | grep '^+' | grep '"resolved"' \
            | sed -n \
              -e 's|.*https://registry.npmjs.org/\(@[^/]*/[^/]*\)/-/.*|\1|p' \
              -e 's|.*https://registry.npmjs.org/\([^@][^/]*\)/-/.*|\1|p' \
            | sort -u)

          if [ -z "$new_packages" ]; then
            echo "No new npm packages detected"
            exit 0
          fi

          for pkg in $new_packages; do
            # Read the installed version from the lockfile's structured JSON.
            # This handles all semver forms (stable, prerelease, build metadata)
            # without fragile URL parsing.
            version=$(jq -r --arg p "node_modules/${pkg}" \
              '.packages[$p].version // empty' package-lock.json)
            if [ -z "$version" ]; then
              echo "::warning::${pkg} — could not determine installed version from lockfile (skipped)"
              continue
            fi

            # Rate-limit registry requests to avoid 429s on large dependency updates.
            sleep 0.2

            # Stream curl directly into jq — avoids buffering multi-MB registry
            # documents (e.g. typescript ~15MB) in a shell variable.
            publish_time=$(curl -sf -m 10 "https://registry.npmjs.org/${pkg}" 2>/dev/null \
              | jq -r --arg v "$version" '.time[$v] // empty')
            if [ -z "$publish_time" ]; then
              echo "::warning::${pkg}@${version} — version not found in registry timestamps (skipped)"
              continue
            fi

            publish_epoch=$(date -d "$publish_time" +%s 2>/dev/null || echo "0")
            if [ "$publish_epoch" -eq 0 ]; then
              echo "::error::Could not parse publish timestamp for ${pkg}@${version}"
              failed=true
              continue
            fi

            age_days=$(( (now_epoch - publish_epoch) / 86400 ))

            if [ "$age_days" -lt "$MIN_AGE_DAYS" ]; then
              echo "::error::${pkg}@${version} published ${age_days} day(s) ago (minimum: ${MIN_AGE_DAYS})"
              failed=true
            else
              echo "  OK: ${pkg}@${version} (${age_days} days old)"
            fi
          done

          if [ "$failed" = true ]; then
            echo ""
            echo "::error::One or more npm dependencies failed the age check."
            echo "To bypass for emergency updates, add the 'age-check-bypass' label to this PR."
            exit 1
          fi

          echo "All npm dependencies are at least ${MIN_AGE_DAYS} days old"
