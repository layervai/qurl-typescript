name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run smoke:dist
      - name: Smoke dist on lowest supported Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.0.0"
      - run: npm run smoke:dist

  # Cross-repo drift fence for the vendored NHP agent-registration golden vectors.
  # `crypto/golden.test.ts` pins the vendored fixture's SHA-256 (catches a LOCAL
  # edit); this job catches the CANONICAL upstream copy diverging. It fetches
  # layervai/qurl-conformance's vectors/agent_registration_golden.json and asserts
  # the vendored copy is byte-for-byte identical. Kept out of `npm test` because it
  # is a network fetch (the unit suite stays hermetic/offline). Retired once the
  # published @layervai/qurl-conformance accessor lands — see TODO(#176) in
  # scripts/check-golden-drift.mjs and src/crypto/golden.test.ts. Tracks #176.
  golden-drift:
    name: Agent-registration golden drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      # qurl-conformance is public, so no token is required to read the file; the
      # default GITHUB_TOKEN is passed only to lift the anonymous API rate limit.
      - name: Verify vendored vectors match canonical qurl-conformance
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-golden-drift.mjs

  # Slack build-completion card. Thin shim over the fleet-shared reusable
  # in layervai/ops-routines-workflows (public mirror of private
  # layervai/ops-routines); the curl/jq Block Kit payload builder and the
  # gate-result aggregation live there now. Adding/removing a gate is a
  # one-line edit to `needs:` + `gates:` here — no aggregation if-chain.
  notify:
    name: Notify
    needs: [test]
    if: always() && github.event_name != 'pull_request'
    permissions: {}
    uses: layervai/ops-routines-workflows/.github/workflows/notify.yml@1536c698add5777aa08c781bc674d1eba469b32d # v0.9.0
    with:
      header: "qURL TypeScript SDK Build"
      gates: '{"Tests": "${{ needs.test.result }}"}'
      extra_fields: '{"SDK": "TypeScript"}'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
