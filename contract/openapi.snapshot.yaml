        period_start:
          type: string
          format: date-time
          readOnly: true
        period_end:
          type: string
          format: date-time
          readOnly: true
        rate_limits:
          type: object
          readOnly: true
          properties:
            create_per_minute:
              type: integer
            create_per_hour:
              type: integer
            list_per_minute:
              type: integer
            resolve_per_minute:
              type: integer
              description: Rate limit for internal token resolution (used by access infrastructure)
            max_active_qurls:
              type: integer
              description: Maximum active QURLs allowed (-1 = unlimited)
            max_tokens_per_qurl:
              type: integer
              description: Maximum tokens per QURL (-1 = unlimited)
            max_expiry_seconds:
              type: integer
              description: Maximum expiry duration in seconds (free=259200/3d, growth=2592000/30d, enterprise=2592000/30d)
        usage:
          type: object
          readOnly: true
          properties:
            qurls_created:
