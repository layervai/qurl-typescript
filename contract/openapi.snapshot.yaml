    AccessCodeData:
      type: object
      properties:
        access_code_id:
          type: string
          readOnly: true
          description: Unique identifier for the access code
          pattern: '^acd_[a-z0-9_-]{11}$'
          example: "acd_k8xqp9h2sj9"
        resource_id:
          type: string
          description: ID of the QURL resource this code grants access to
