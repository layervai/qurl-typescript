        user_agent:
          type: string
          description: Client user agent
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: string
          format: date-time

    SessionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SessionData'
        meta:
          $ref: '#/components/schemas/Meta'

    SessionTerminateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            terminated:
              type: integer
              description: Number of sessions terminated
        meta:
          $ref: '#/components/schemas/Meta'

    ResourceResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ResourceData'
        meta:
          $ref: '#/components/schemas/Meta'

    ResourceDetailResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ResourceDetailData'
