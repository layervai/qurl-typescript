    # API Key schemas
    CreateApiKeyRequest:
      type: object
      required:
        - name
        - scopes
      properties:
        name:
          type: string
          maxLength: 100
          description: Human-readable name for the API key
        scopes:
          type: array
          minItems: 1
          items:
            type: string
            enum: [qurl:read, qurl:write, qurl:resolve]
          description: Permissions granted to this API key

    UpdateApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          description: Updated name for the API key
        scopes:
          type: array
          minItems: 1
          items:
            type: string
            enum: [qurl:read, qurl:write, qurl:resolve]
          description: |
            Updated permissions for the API key.
            Omit this field to leave scopes unchanged.
            When provided, replaces all existing scopes (not a merge).

    ApiKeyData:
      type: object
      properties:
        key_id:
          type: string
          pattern: '^key_[A-Za-z0-9]{12}$'
          readOnly: true
        key_prefix:
          type: string
          readOnly: true
          description: >-
            First 12 characters of the key for identification.
            Includes the environment prefix (e.g., "lv_live_a3x9").
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
          description: >-
            Permissions granted to this API key.
            Returned in alphabetical order for deterministic responses.
        status:
          type: string
          enum: [active, revoked]
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: >-
            Timestamp of the last update to name or scopes.
            Omitted if the key has never been updated.
        last_used_at:
          type: string
          format: date-time
          readOnly: true

    CreateApiKeyData:
      allOf:
        - $ref: '#/components/schemas/ApiKeyData'
        - type: object
          properties:
            api_key:
              type: string
              readOnly: true
              description: |
                The plaintext API key. This is returned only once at creation time.
                Store it securely - it cannot be retrieved again.

    CreateApiKeyResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CreateApiKeyData'
        meta:
          $ref: '#/components/schemas/Meta'

    ApiKeyResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ApiKeyData'
        meta:
          $ref: '#/components/schemas/Meta'

    ApiKeyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyData'
        meta:
          $ref: '#/components/schemas/ListMeta'

