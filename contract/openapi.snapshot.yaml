# Minimal OpenAPI snapshot — the subset of the upstream QURL API
# contract this SDK's public methods call.
#
# NOT a full OpenAPI document. Operation bodies are empty (`{}`), which
# a strict OpenAPI 3.0.3 validator would flag as invalid (operations
# require `responses`). Intentional: the contract test reads only the
# `(verb, path)` pairs from `paths.*.<verb>` keys, never the operation
# contents. If schema-level validation (e.g. ajv body checks) is ever
# added, this file will need to become a valid OpenAPI doc first.
#
# Hand-maintained. Update this file in lockstep with src/client.ts when
# the upstream API adds/renames an endpoint the SDK uses. The contract
# test (src/contract.test.ts) fails loudly when the two diverge.
openapi: 3.0.3
info:
  title: QURL API — SDK contract surface
  version: "1"
paths:
  /v1/qurls:
    get: {}
    post: {}
  /v1/qurls/{id}:
    get: {}
    patch: {}
    delete: {}
  /v1/qurls/{id}/mint_link:
    post: {}
  /v1/resolve:
    post: {}
  /v1/quota:
    get: {}
