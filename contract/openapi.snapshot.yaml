                  invoices:
                    - id: "in_1234"
                      amount_cents: 1500
                      status: "paid"
                      created_at: "2026-02-01T00:00:00Z"
                      pdf_url: "https://pay.stripe.com/invoice/..."
                meta:
                  request_id: "req_abc123"
                  has_more: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
